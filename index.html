<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoxiChat - Realtime Chat</title>
    <!-- We import our style entry point -->
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased h-screen overflow-hidden">
    
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex flex-col items-center justify-center h-screen bg-slate-50 p-4">
      <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border border-slate-100">
        <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-md shadow-indigo-200">
          <!-- Inline modern MessageSquare SVG icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <h1 class="text-3xl font-bold text-slate-900 mb-2 tracking-tight">NoxiChat</h1>
        <p class="text-slate-500 mb-8 leading-relaxed">Connect with your friends in real-time. Simple, secure, and blazing fast.</p>
        
        <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-lg hover:shadow-indigo-200 cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <!-- MAIN APP SCREEN (Initially hidden) -->
    <div id="app-screen" class="hidden flex h-screen bg-slate-100 overflow-hidden">
      
      <!-- SIDEBAR -->
      <aside class="w-80 h-full bg-white border-r border-slate-200 flex flex-col flex-shrink-0">
        <!-- Sidebar Header -->
        <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
          <div class="flex items-center gap-3">
            <img id="user-avatar" src="" alt="Profile" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" referrerpolicy="no-referrer" />
            <div class="min-w-0">
              <p id="user-name" class="text-sm font-semibold text-slate-900 truncate max-w-[100px]"></p>
              <p class="text-xs text-slate-500 flex items-center gap-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online
              </p>
            </div>
          </div>
          <div class="flex items-center gap-1">
            <button id="open-new-chat-btn" class="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-600 cursor-pointer" title="New Chat">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="logout-btn" class="p-2 hover:bg-red-50 hover:text-red-600 rounded-full transition-colors text-slate-600 cursor-pointer" title="Logout">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </div>
        </div>

        <!-- Sidebar Search -->
        <div class="p-4">
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input id="chat-search" type="text" placeholder="Search chats..." class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
          </div>
        </div>

        <!-- Sidebar Chat List -->
        <div id="chat-list" class="flex-1 overflow-y-auto">
          <!-- Populated dynamically via JS -->
        </div>
      </aside>

      <!-- CHAT WINDOW AREA -->
      <main class="flex-1 relative bg-white">
        
        <!-- EMPTY STATE (Shown when no chat selected) -->
        <div id="no-chat-state" class="h-full flex flex-col items-center justify-center text-slate-400 p-8 text-center bg-slate-50">
          <div class="bg-white p-6 rounded-full shadow-sm border border-slate-100 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h2 class="text-xl font-semibold text-slate-700">Welcome to NoxiChat</h2>
          <p class="max-w-xs mt-2 text-slate-500 text-sm">Select a conversation or start a new one to begin chatting.</p>
        </div>

        <!-- ACTIVE CHAT WINDOW (Initially hidden) -->
        <div id="active-chat-state" class="hidden flex flex-col h-full bg-white">
          <!-- Chat Window Header -->
          <header class="p-4 border-b border-slate-100 flex items-center justify-between bg-white/80 backdrop-blur-md sticky top-0 z-10 shadow-xs">
            <div class="flex items-center gap-3">
              <div class="relative">
                <img id="active-chat-avatar" src="" alt="" class="w-10 h-10 rounded-full object-cover" referrerpolicy="no-referrer" />
                <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white rounded-full"></span>
              </div>
              <div>
                <h3 id="active-chat-name" class="font-bold text-slate-900 leading-tight">...</h3>
                <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Online</p>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <button class="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors cursor-pointer" title="Voice Call">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </button>
              <button class="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors cursor-pointer" title="Video Call">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7a2 2 0 0 0-2-2h-3a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h3a2 2 0 0 0 2-2V7zM1 5h11a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H1a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/></svg>
              </button>
            </div>
          </header>

          <!-- Chat Window Messages Scroll Area -->
          <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50">
            <!-- Messages populated dynamically -->
          </div>

          <!-- Chat Window Input -->
          <footer class="p-4 bg-white border-t border-slate-100">
            <form id="message-form" class="flex items-center gap-2 bg-slate-100 p-2 rounded-2xl focus-within:ring-2 focus-within:ring-indigo-500 transition-all">
              <button type="button" class="p-2 hover:bg-white rounded-xl text-slate-400 transition-colors cursor-pointer" title="Emoji">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              </button>
              <button type="button" class="p-2 hover:bg-white rounded-xl text-slate-400 transition-colors cursor-pointer" title="Attach">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <input id="message-input" type="text" placeholder="Type a message..." class="flex-1 bg-transparent border-none focus:outline-none focus:ring-0 text-sm py-2 px-1" />
              <button id="send-btn" type="submit" class="p-2 rounded-xl transition-all bg-indigo-600 hover:bg-indigo-700 text-white shadow-md shadow-indigo-100 cursor-pointer flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </form>
          </footer>
        </div>

      </main>
    </div>

    <!-- NEW CHAT MODAL (Initially hidden) -->
    <div id="new-chat-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-xs z-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-all">
        <div class="p-4 border-b border-slate-100 flex items-center justify-between">
          <h3 class="font-bold text-slate-900">New Conversation</h3>
          <button id="close-modal-btn" class="p-1 hover:bg-slate-100 rounded-full cursor-pointer text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <form id="new-chat-form" class="p-6">
          <p class="text-sm text-slate-500 mb-4">Enter your friend's email address to start a secure chat.</p>
          <div class="space-y-4">
            <div>
              <input id="new-chat-email" type="email" required placeholder="friend@example.com" class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
              <p id="new-chat-error" class="hidden text-xs text-red-500 mt-2 ml-1"></p>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-indigo-100 cursor-pointer">
              Start Chat
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Script Entry point -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
